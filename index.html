<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶の美術館 - Prologue</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-wrapper {
            width: 1280px;
            height: 720px;
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #game-container { 
            position: relative; 
            width: 1280px; 
            height: 720px; 
            background: #000; 
            cursor: pointer; 
            flex-shrink: 0;
            overflow: hidden;
        }

        #background { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; transition: background-image 0.8s; opacity: 1; }
        #character-container { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 95%; width: 100%; display: flex; justify-content: center; align-items: flex-end; pointer-events: none; }
        #character { height: 100%; transition: opacity 0.3s; opacity: 0; }
        
        #message-box { 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            height: 180px; 
            background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #fff; 
            color: #fff; 
            padding: 20px 30px; 
            box-sizing: border-box; 
            font-size: 28px; 
            line-height: 1.6; 
            z-index: 10; 
        }

        #name-tag { 
            position: absolute; 
            top: -40px; 
            left: 0; 
            background: #fff; 
            color: #000; 
            padding: 5px 30px; 
            font-weight: bold; 
            font-size: 24px; 
            display: none; 
        }

        #choices { 
            position: absolute; 
            top: 45%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            display: none; 
            flex-direction: column; 
            gap: 20px; 
            z-index: 20; 
            width: 100%;
            align-items: center;
        }

        .choice-btn { 
            width: 500px; 
            max-width: 80%;
            padding: 15px; 
            background: #fff; 
            border: 3px solid #000; 
            cursor: pointer; 
            font-size: 24px; 
            font-weight: bold; 
            text-align: center; 
            transition: 0.2s;
        }

        .choice-btn:active { background: #ff0000; color: #fff; }
        
        .quake { animation: quake 0.1s infinite; }
        @keyframes quake { 
            0% { transform: translate(0,0); } 
            25% { transform: translate(-8px,8px); } 
            50% { transform: translate(8px,-8px); } 
            75% { transform: translate(-8px,-8px); } 
            100% { transform: translate(8px,8px); } 
        }
    </style>
</head>

        { text: "自分の居場所が分からなくなってしまった俺は、彼女に従うことにしたのだ。" },
        { name: "べーた", text: "ただ放り込めばいいわけじゃあないわ。n" },
        { name: "べーた", text: "物事には必ず順番ってのがあるのよ。ｈ" },
        { text: "「順番？」" },
        { name: "べーた", text: "この美術品は正しい順番で片付けないと牙を向くの。ｎ" },
        { name: "べーた", text: "この１２個の美術品をよく考えて袋につめなさい。" },
        { text: "牙を向くって･･･。" },
        { text: "「で、その正しい順番ってのはなんなんだ？」" },

        { text: "「鼓動･･･？？」" },
        { text: "訳の分からないことが２個も３個も増えていく。" },

        { name: "べーた", text: "ほら、さっさと取りかかりなさい。" },
        { text: "「はぁ･･･」" }
    ];

    let currentStep = 0;
    let charIndex = 0;
    let isTyping = false;
    let typingTimer;
    let currentFace = 'photo/beta_normal.png'; 
    let charVisible = false;
    let currentBgmPath = "";
    const bgmAudio = new Audio();
    bgmAudio.loop = true;

    const bgEl = document.getElementById('background');
    const charEl = document.getElementById('character');
    const nameEl = document.getElementById('name-tag');
    const textEl = document.getElementById('text-display');
    const choiceEl = document.getElementById('choices');
    const container = document.getElementById('game-container');

    function update() {
        const step = rawScenario[currentStep];
        if (!step) {
            window.location.href = "kataduke.html";
            return;
        }

        if (step.bgm && step.bgm !== currentBgmPath) {
            currentBgmPath = step.bgm;
            bgmAudio.pause();
            bgmAudio.src = step.bgm;
            bgmAudio.play().catch(() => {});
        } else if (step.bgm === "music/muon.wav") {
            bgmAudio.pause();
            currentBgmPath = "music/muon.wav";
        }

        if (step.se) new Audio(step.se).play().catch(() => {});
        if (step.bg) bgEl.style.backgroundImage = `url(${step.bg})`;
        if (step.showChar) charVisible = true;

        let rawText = step.text || "";
        const lastChar = rawText.slice(-1);

        if (faceMap[lastChar]) {
            currentFace = faceMap[lastChar];
            rawText = rawText.slice(0, -1);
        }

        charEl.src = currentFace;
        charEl.style.opacity = charVisible ? "1" : "0";
        nameEl.textContent = step.name || "";
        nameEl.style.display = step.name ? "block" : "none";
        container.classList.toggle('quake', step.type === "quake");

        startTyping(rawText, step);
    }

    function startTyping(text, step) {
        clearInterval(typingTimer);
        charIndex = 0;
        textEl.innerText = "";
        isTyping = true;
        typingTimer = setInterval(() => {
            if (charIndex < text.length) {
                textEl.innerText += text[charIndex++];
            } else {
                clearInterval(typingTimer);
                isTyping = false;
                if (step.type === "choice") showChoices(step);
            }
        }, 40);
    }

    function showChoices(step) {
        choiceEl.style.display = "flex";
        choiceEl.innerHTML = "";
        step.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.textContent = opt;
            btn.onclick = (e) => {
                e.stopPropagation();
                choiceEl.style.display = "none";
                rawScenario.splice(currentStep + 1, 0, ...step.branches[index]);
                next();
            };
            choiceEl.appendChild(btn);
        });
    }

    function next() {
        if (isTyping) {
            clearInterval(typingTimer);
            isTyping = false;
            let fullText = rawScenario[currentStep].text || "";
            if (faceMap[fullText.slice(-1)]) fullText = fullText.slice(0, -1);
            textEl.innerText = fullText;
        } else {
            currentStep++;
            update();
        }
    }

    container.onclick = () => {
        if (bgmAudio.paused && currentBgmPath !== "" && currentBgmPath !== "music/muon.wav") bgmAudio.play().catch(()=>{});
        if (rawScenario[currentStep]?.type === "choice") return;
        next();
    };

    update();
</script>
