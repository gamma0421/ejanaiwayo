<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>記憶の修復</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #0c0c0c; color: white; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; font-family: sans-serif; overflow: hidden; }
        
        #scaler { display: flex; flex-direction: column; align-items: center; justify-content: center; transform-origin: center; }
        
        #puzzle-area { position: relative; width: 800px; height: 600px; border: 1px solid #333; background: #111; }
        
        #target-container { 
            position: absolute; 
            width: 500px; 
            height: 300px; 
            top: 150px; 
            left: 150px; 
            border: 2px dashed #555; 
            background: rgba(255,255,255,0.02); 
            z-index: 1;
        }

        .piece { 
            position: absolute; 
            width: 100px; 
            height: 100px; 
            cursor: grab; 
            background-color: #333;
            background-size: 500px 300px; 
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 10;
            box-sizing: border-box;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }
        .piece.dragging { cursor: grabbing; z-index: 1000 !important; border-color: #0cf; box-shadow: 5px 5px 20px rgba(0,0,0,0.8); }
        
        .target-slot { 
            position: absolute; 
            width: 100px; 
            height: 100px; 
            border: 1px solid rgba(255,255,255,0.05); 
            pointer-events: none; 
        }

        #message { margin-bottom: 20px; font-size: 1.5rem; color: #0cf; min-height: 1.5em; text-align: center; }
        #reset-btn { margin-top:10px; padding:10px 20px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="scaler">
        <div id="message">破片を枠の中に運びなさい。</div>
        <div id="puzzle-area">
            <div id="target-container"></div>
        </div>
        <button id="reset-btn" onclick="location.reload()">リセット</button>
    </div>

<script>
    const ROWS = 3, COLS = 5, PIECE_SIZE = 100, OFFSET_X = 150, OFFSET_Y = 150, SNAP_DIST = 40;
    let completedPieces = 0;
    const totalPieces = ROWS * COLS;
    const scaler = document.getElementById('scaler');

    function resize() {
        const baseWidth = 850;
        const baseHeight = 750;
        const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight) * 0.95;
        scaler.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', resize);
    resize();

    function initPuzzle() {
        const area = document.getElementById('puzzle-area');
        const container = document.getElementById('target-container');

        for (let i = 0; i < totalPieces; i++) {
            const r = Math.floor(i / COLS), c = i % COLS;
            const targetX = c * PIECE_SIZE, targetY = r * PIECE_SIZE;

            const slot = document.createElement('div');
            slot.className = 'target-slot';
            slot.style.left = targetX + 'px';
            slot.style.top = targetY + 'px';
            container.appendChild(slot);

            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.style.backgroundImage = "url('photo/complete_image.jpg')"; 
            piece.style.backgroundPosition = `-${targetX}px -${targetY}px`;
            
            const startX = Math.random() < 0.5 ? Math.random() * 80 : 620 + Math.random() * 80;
            const startY = Math.random() * 450;
            piece.style.left = startX + 'px';
            piece.style.top = startY + 'px';

            setupDraggable(piece, targetX + OFFSET_X, targetY + OFFSET_Y);
            area.appendChild(piece);
        }
    }

    function setupDraggable(el, destX, destY) {
        let isDragging = false;
        let startX, startY;

        const onPointerDown = (e) => {
            if (el.dataset.fixed === "true") return;
            isDragging = true;
            el.classList.add('dragging');
            
            const rect = el.getBoundingClientRect();
            const currentScale = scaler.getBoundingClientRect().width / scaler.offsetWidth;
            startX = (e.clientX - rect.left) / currentScale;
            startY = (e.clientY - rect.top) / currentScale;
            
            el.setPointerCapture(e.pointerId);
        };

        const onPointerMove = (e) => {
            if (!isDragging) return;
            
            const areaRect = document.getElementById('puzzle-area').getBoundingClientRect();
            const currentScale = scaler.getBoundingClientRect().width / scaler.offsetWidth;
            
            let newX = (e.clientX - areaRect.left) / currentScale - startX;
            let newY = (e.clientY - areaRect.top) / currentScale - startY;
            
            el.style.left = newX + 'px';
            el.style.top = newY + 'px';
        };

        const onPointerUp = (e) => {
            if (!isDragging) return;
            isDragging = false;
            el.classList.remove('dragging');
            el.releasePointerCapture(e.pointerId);

            const curX = parseFloat(el.style.left);
            const curY = parseFloat(el.style.top);

            if (Math.abs(curX - destX) < SNAP_DIST && Math.abs(curY - destY) < SNAP_DIST) {
                el.style.left = destX + 'px';
                el.style.top = destY + 'px';
                el.style.border = "none";
                el.style.boxShadow = "none";
                el.style.cursor = "default";
                el.dataset.fixed = "true";
                completedPieces++;
                if (completedPieces === totalPieces) {
                    document.getElementById('message').innerText = "……全部つながったわ。あんたにしては上出来ね。";
                    setTimeout(() => {
                        window.location.href = "map5.html";
                    }, 2000);
                }
            }
        };

        el.addEventListener('pointerdown', onPointerDown);
        el.addEventListener('pointermove', onPointerMove);
        el.addEventListener('pointerup', onPointerUp);
    }

    initPuzzle();
</script>
</body>
</html>
