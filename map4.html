        { text: "俺の言葉をゆっくりと飲み込み、やがて懐疑心と嫌悪感と少しの興味を持ったような顔になったべーたは、q" },

    let currentScenario = rawScenario;
    let currentStep = 0;
    let charIndex = 0;
    let isTyping = false;
    let typingTimer;
    let currentFace = ''; 
    let charVisible = false;
    let currentBgmPath = "";
    const bgmAudio = new Audio();
    bgmAudio.loop = true;

    // SE管理用の独立したAudio
    let currentSeAudio = null;

    const bgEl = document.getElementById('background');
    const charEl = document.getElementById('character');
    const nameEl = document.getElementById('name-tag');
    const textEl = document.getElementById('text-display');
    const choiceEl = document.getElementById('choices');
    const container = document.getElementById('game-container');

    function processFaceCommand(text) {
        let cleanText = text;
        let commandFound = null;
        const keys = Object.keys(faceMap).concat(['q']).join('|');
        const regex = new RegExp(`[\\s　]?(${keys})$`);
        const match = cleanText.match(regex);
        if (match) {
            commandFound = match[1];
            cleanText = cleanText.replace(regex, '');
        }
        return { cleanText, commandFound };
    }

    function performUpdate() {
        const step = currentScenario[currentStep];
        if (!step) return;

        // ゲームオーバー時の処理
        if (step.type === "gameover") {
            container.onclick = null;
            startTyping(step.text);
            // 4秒後に最初のシナリオ（選択肢が出る前の状態）に戻す
            setTimeout(() => { 
                currentScenario = rawScenario;
                currentStep = rawScenario.length - 1; // 選択肢のステップへ
                container.onclick = handleNext;
                performUpdate();
            }, 4000);
            return;
        }

        if (step.type === "ending") {
            startTyping(step.text);
            container.onclick = () => { window.location.href = "puzzle.html"; };
            return;
        }

        // BGM (SEとは別系統なので重なって良い)
        if (step.bgm && step.bgm !== currentBgmPath) {
            currentBgmPath = step.bgm;
            bgmAudio.pause();
            if (step.bgm !== "music/muon.wav") {
                bgmAudio.src = step.bgm;
                bgmAudio.play().catch(() => {});
            }
        }

        // SE (再生中のものを中断してから新しいのを流す)
        if (step.se) {
            if (currentSeAudio) {
                currentSeAudio.pause();
                currentSeAudio.currentTime = 0;
            }
            currentSeAudio = new Audio(step.se);
            currentSeAudio.play().catch(() => {});
        }
        
        if (step.bg) bgEl.style.backgroundImage = `url(${step.bg})`;
        
        container.classList.remove('quake', 'flash', 'black-out');
        bgEl.classList.remove('black-out');
        if (step.type === "quake") container.classList.add('quake');
        if (step.type === "flash") container.classList.add('flash');
        if (step.type === "blackout") bgEl.classList.add('black-out');

        const { cleanText, commandFound } = processFaceCommand(step.text || "");

        if (commandFound) {
            if (commandFound === 'q') {
                charVisible = false;
            } else if (faceMap[commandFound]) {
                currentFace = faceMap[commandFound];
                charVisible = true;
            }
        }

        charEl.src = currentFace;
        charEl.style.opacity = charVisible ? "1" : "0";
        nameEl.textContent = step.name || "";
        nameEl.style.display = step.name ? "block" : "none";
        
        if (step.type === "choice") {
            textEl.innerText = "";
            showChoices(step);
        } else {
            startTyping(cleanText);
        }
    }

    function startTyping(text) {
        clearInterval(typingTimer);
        charIndex = 0;
        textEl.innerText = "";
        isTyping = true;
        typingTimer = setInterval(() => {
            if (charIndex < text.length) {
                textEl.innerText += text[charIndex++];
            } else {
                clearInterval(typingTimer);
                isTyping = false;
            }
        }, 30);
    }

    function showChoices(step) {
        container.onclick = null;
        choiceEl.style.display = "flex";
        choiceEl.innerHTML = "";
        step.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "choice-btn";
            btn.textContent = opt;
            btn.onclick = (e) => {
                e.stopPropagation();
                choiceEl.style.display = "none";
                playBranch(index === 0 ? scenario_1 : scenario_2);
            };
            choiceEl.appendChild(btn);
        });
    }

    function playBranch(branchScenario) {
        currentScenario = branchScenario;
        currentStep = 0;
        container.onclick = handleNext;
        performUpdate();
    }

    function handleNext() {
        if (isTyping) {
            clearInterval(typingTimer);
            const step = currentScenario[currentStep];
            const { cleanText } = processFaceCommand(step.text || "");
            textEl.innerText = cleanText;
            isTyping = false;
        } else {
            currentStep++;
            if (currentStep < currentScenario.length) {
                performUpdate();
            }
        }
    }

    const startHandler = () => {
        performUpdate();
        container.onclick = handleNext;
    };
    container.onclick = startHandler;
